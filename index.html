<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>감정 음악 추천</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
}

button {
    margin: 10px;
    padding: 15px 25px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-size: 16px;
}

.happy { background: #feca57; }
.sad { background: #54a0ff; }
.angry { background: #ff6b6b; }
.calm { background: #1dd1a1; }

</style>
</head>

<body>

<div class="container">
    <h2>What kind of music are you in the mood for?</h2>

    <button class="happy" onclick="playMood('happy')">😊 Happy</button>
    <button class="sad" onclick="playMood('sad')">😢 Sad</button>
    <button class="angry" onclick="playMood('angry')">😡 Angry</button>
    <button class="calm" onclick="playMood('calm')">😌 Calm</button>

    <br><br>

    <audio id="music"></audio>
</div>

<script>
const music = document.getElementById("music");

function playMood(mood) {

    if(mood === "happy") {
        music.src = "happy.mp3";
        document.body.style.background = "#feca57";
    }
    else if(mood === "sad") {
        music.src = "sad.mp3";
        document.body.style.background = "#54a0ff";
    }
    else if(mood === "angry") {
        music.src = "angry.mp3";
        document.body.style.background = "#ff6b6b";
    }
    else if(mood === "calm") {
        music.src = "calm.mp3";
        document.body.style.background = "#1dd1a1";
    }

    music.play();
}
</script>

</body>
</html>
